<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map — Lethpolytech CIT Student Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <div class="logo">
            <a href="index.html">
                <svg viewBox="-3 -2 40 40" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <defs>
                        <clipPath id="logo-circ"><circle cx="20" cy="20" r="14" /></clipPath>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#5bc8f0" />
                            <stop offset="45%" stop-color="#8dd8b0" />
                            <stop offset="100%" stop-color="#72c040" />
                        </linearGradient>
                    </defs>

                    <circle cx="20" cy="20" r="14" fill="url(#logo-grad)" />

                    <g clip-path="url(#logo-circ)">
                        <path d="M6 20 L6 17 L10 11 L14 16 L17.5 12 L20 9 L22.5 12 L26 16 L30 11 L34 17 L34 20 Z" fill="#4ab0e0" />
                        <path d="M6 18.5 L10 12.5 L14 17.5 L17.5 13.5 L20 10.5 L22.5 13.5 L26 17.5 L30 12.5 L34 18.5" fill="none" stroke="white" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" />
                        <path d="M6 20.5 L6 20 L9 15 L13 19 L17 15.5 L20 13 L23 15.5 L27 19 L31 15 L34 20 L34 20.5 Z" fill="#5bc8f0" />
                        <path d="M6 20.5 L9 16 L13 20 L17 16.5 L20 14 L23 16.5 L27 20 L31 16 L34 20.5" fill="none" stroke="white" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" />
                        <path d="M6 22 Q13 20 20 20.5 Q27 21 34 22 L34 25 Q27 24 20 23.5 Q13 24 6 25 Z" fill="#7ecfa0" />
                        <path d="M6 26 Q13 24.5 20 25 Q27 25.5 34 26 L34 30 Q27 29 20 28.5 Q13 29 6 30 Z" fill="#72c455" />
                        <path d="M6 31 Q13 29.5 20 30 Q27 30.5 34 31 L34 34 Q27 33.5 20 33.5 Q13 33.5 6 34 Z" fill="#5db030" />
                        <path d="M6 25 Q13 23.5 20 24 Q27 24.5 34 25" fill="none" stroke="white" stroke-width="1.3" />
                        <path d="M6 30 Q13 28.5 20 29 Q27 29.5 34 30" fill="none" stroke="white" stroke-width="1.3" />
                    </g>
                </svg>
            </a>
        </div>
        <h1>Lethpolytech CIT Student Guide Page</h1>
    </header>

    <div class="body-wrap">
        <nav>
            <a href="index.html">Home</a>
            <a href="map.html" class="active">Map</a>
            <a href="classes.html">Classes</a>
            <a href="profs.html">Prof's</a>
            <a href="skills.html">Skills</a>
        </nav>

        <main id="main-area">
            <div class="map-content">

                <div class="map-top-bar">
                    <div class="map-dropdown-wrap">
                        <label for="building-select">Interactable Building Map</label>
                        <select class="figma-select" id="building-select" onchange="loadBuildingMap()">
                            <option value="ib">IB Building (IB)</option>
                            <option value="main">Main Hall (CE)</option>
                            <option value="tech">Tech Centre (TT)</option>
                            <option value="full">Full Building</option>
                        </select>
                    </div>
                    <div class="map-tabs">
                        <div class="map-tab active" data-tab="floorplan" onclick="selectMapTab(this)">General</div>
                        <div class="map-tab" data-tab="parking" onclick="selectMapTab(this)">Parking</div>
                        <div class="map-tab" data-tab="accessibility" onclick="selectMapTab(this)">Accessibility</div>
                    </div>
                </div>

                <div class="map-body">
                    <div class="map-key-panel">
                        <h3>Map Key:</h3>
                        <div class="map-key" id="key-accessibility">
                            <img src="images/key_accessibility.png" alt="Accessibility map key">
                        </div>
                    </div> 
                    <div class="map-image-area">
                        <div class="map-zoom-btns">
                            <button onclick="zoomIn()">+</button>
                            <button onclick="zoomOut()">-</button>
                        </div>
                        <img draggable="false" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs=" alt="A map of the school">
                    </div>
                </div>

            </div>
        </main>
    </div>

    <footer>
        <a href="https://lethpolytech.ca/" target="_blank">Polytechnic official site</a>
        <a href="https://citweb.lethpolytech.ca/" target="_blank">CIT Web</a>
        <a href="https://lethbridge.instructure.com/" target="_blank">Canvas</a>
        <a href="https://ssui.lethpolytech.ca/Student/?hideProxyDialog=false" target="_blank">Self-Service</a>
        <a href="https://office.com" target="_blank">Office 365</a>
        <a href="https://lethpolytech.ca/departments" target="_blank">Polytechnic Departments</a>
        <button class="top-btn-mobile" onclick="scrollToTop()">Top &#8896;</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
